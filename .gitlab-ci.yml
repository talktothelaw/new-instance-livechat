workflow:
  rules:
    - if: $CI_PROJECT_PATH == "new-instance/chat-service-sdk/liveandaichat-ios"

stages:
  - mirror

mirror_to_talktothelaw:
  stage: mirror
  image: alpine:latest
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
    MIRROR_URL: "git@gitlab.com:talktothelaw/liveandaichat-ios.git"
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$MIRROR_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -t ed25519,rsa gitlab.com >> ~/.ssh/known_hosts 2>/dev/null
    - git config --global user.email "ci-mirror@gitlab.com"
    - git config --global user.name "GitLab Mirror Bot"
  script:
    - git remote remove mirror 2>/dev/null || true
    - git remote add mirror "$MIRROR_URL"
    - git fetch origin "+refs/heads/*:refs/heads/*" "+refs/tags/*:refs/tags/*"
    - git push --prune mirror "+refs/heads/*:refs/heads/*" "+refs/tags/*:refs/tags/*"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
